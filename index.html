<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>MarketHub - Gestion B2B</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'fade-in-down': 'fade-in-down 0.3s ease-out'
          },
          keyframes: {
            'fade-in-down': {
              'from': { opacity: '0', transform: 'translateY(-10px)' },
              'to': { opacity: '1', transform: 'translateY(0)' }
            }
          }
        }
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <div id="root"></div>
  <script>
    // ==================== CODE MONOLITHIQUE SANS JSX ====================
    const { useState, useEffect, useCallback, useMemo, useRef } = React;

    // --------------------------------------------------------------------
    // Composant App complet (converti en React.createElement)
    // --------------------------------------------------------------------
    const App = () => {
      // ---------- États (identiques à l'original) ----------
      const [isAdmin, setIsAdmin] = useState(false);
      const [currentView, setCurrentView] = useState('home');
      const [selectedBrand, setSelectedBrand] = useState(null);
      const [isTransitioning, setIsTransitioning] = useState(false);
      const [notification, setNotification] = useState(null);
      const [isLoading, setIsLoading] = useState(true);
      
      const [showModal, setShowModal] = useState(false);
      const [showProductModal, setShowProductModal] = useState(false);
      const [showBrandSelect, setShowBrandSelect] = useState(false);
      const [showManageModal, setShowManageModal] = useState(false);
      const [showOrdersModal, setShowOrdersModal] = useState(false);
      const [showDataModal, setShowDataModal] = useState(false);
      const [editingProduct, setEditingProduct] = useState(null);
      const [editingBrand, setEditingBrand] = useState(null);
      const [manageSelectedBrand, setManageSelectedBrand] = useState(null);
      const [confirmAction, setConfirmAction] = useState(null);
      const [showPinModal, setShowPinModal] = useState(false);
      const [pinCode, setPinCode] = useState('');
      const [showPrices, setShowPrices] = useState(true);
      
      const [brands, setBrands] = useState(() => {
        const saved = localStorage.getItem('marketHubBrands');
        return saved ? JSON.parse(saved) : [];
      });
      const [newBrand, setNewBrand] = useState({ name: "", image: null });
      const [newProduct, setNewProduct] = useState({ name: "", qty: "", price: "", image: null, brandId: null });
      const [cart, setCart] = useState(() => {
        const savedCart = localStorage.getItem('marketHubCart');
        return savedCart ? JSON.parse(savedCart) : [];
      });
      const [orders, setOrders] = useState(() => {
        const savedOrders = localStorage.getItem('marketHubOrders');
        return savedOrders ? JSON.parse(savedOrders) : [];
      });
      const [selectedProduct, setSelectedProduct] = useState(null);
      const [showCartModal, setShowCartModal] = useState(false);
      const [productQuantity, setProductQuantity] = useState(1);
      const [showDeliveryModal, setShowDeliveryModal] = useState(false);
      const [deliveryInfo, setDeliveryInfo] = useState({ name: "", phone: "", address: "", instructions: "" });
      const [ordersActiveTab, setOrdersActiveTab] = useState("new");
      const [logs, setLogs] = useState([]);
      const [showDebug, setShowDebug] = useState(false);
      const logsEndRef = useRef(null);
      const [sheetJsReady, setSheetJsReady] = useState(false);
      const [previewData, setPreviewData] = useState(null);
      const [isImporting, setIsImporting] = useState(false);
      const firebaseInitialized = useRef(false);
      const [firebaseReady, setFirebaseReady] = useState(false);
      const initialLoadDone = useRef(false);
      
      const addLog = useCallback((type, ...args) => {
        const timestamp = new Date().toLocaleTimeString();
        const message = args.map(arg => {
          if (typeof arg === 'object') {
            try { return JSON.stringify(arg); } catch(e) { return String(arg); }
          }
          return String(arg);
        }).join(' ');
        setLogs(prev => [{ type, timestamp, message }, ...prev].slice(0, 500));
      }, []);
      
      // Override console
      useEffect(() => {
        const originalLog = console.log;
        const originalError = console.error;
        console.log = (...args) => { addLog('log', ...args); originalLog(...args); };
        console.error = (...args) => { addLog('error', ...args); originalError(...args); };
        const handleGlobalError = (event) => addLog('error', `Global: ${event.message}`);
        const handlePromiseRejection = (event) => addLog('error', `Unhandled Rejection: ${event.reason}`);
        window.addEventListener('error', handleGlobalError);
        window.addEventListener('unhandledrejection', handlePromiseRejection);
        return () => {
          console.log = originalLog;
          console.error = originalError;
          window.removeEventListener('error', handleGlobalError);
          window.removeEventListener('unhandledrejection', handlePromiseRejection);
        };
      }, [addLog]);
      
      // Firebase loading (identique)
      useEffect(() => {
        let mounted = true;
        const loadFirebase = async () => {
          try {
            if (window.firebase && window.firebase.apps && window.firebase.apps.length) {
              addLog('log', 'Firebase déjà présent');
              if (mounted) { setFirebaseReady(true); if (!initialLoadDone.current) loadDataFromFirebase(); setIsLoading(false); }
              return;
            }
            const appScript = document.createElement('script');
            appScript.src = 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js';
            appScript.async = true;
            await new Promise((resolve, reject) => { appScript.onload = resolve; appScript.onerror = reject; document.head.appendChild(appScript); });
            const dbScript = document.createElement('script');
            dbScript.src = 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js';
            dbScript.async = true;
            await new Promise((resolve, reject) => { dbScript.onload = resolve; dbScript.onerror = reject; document.head.appendChild(dbScript); });
            if (!firebaseInitialized.current && window.firebase) {
              const firebaseConfig = {
                apiKey: "AIzaSyBauxPkS-FXjCSErcluaOlReANeOL0vPEs",
                authDomain: "monapp-d2909.firebaseapp.com",
                databaseURL: "https://monapp-d2909-default-rtdb.europe-west1.firebasedatabase.app",
                projectId: "monapp-d2909",
                storageBucket: "monapp-d2909.firebasestorage.app",
                messagingSenderId: "632425841691",
                appId: "1:632425841691:web:1a701a8d3dd72d9bfee4be"
              };
              if (!window.firebase.apps.length) window.firebase.initializeApp(firebaseConfig);
              firebaseInitialized.current = true;
              if (mounted) { setFirebaseReady(true); loadDataFromFirebase(); }
            }
            if (mounted) setIsLoading(false);
          } catch(err) { addLog('error', 'Firebase: ' + err.message); if(mounted) setIsLoading(false); }
        };
        loadFirebase();
        return () => { mounted = false; };
      }, [addLog]);
      
      const loadDataFromFirebase = () => {
        if (!window.firebase || !window.firebase.database) return;
        window.firebase.database().ref('/').once('value').then(snapshot => {
          const data = snapshot.val();
          if (data && data.data) { setBrands(data.data); localStorage.setItem('marketHubBrands', JSON.stringify(data.data)); }
          if (data && data.orders) { setOrders(data.orders); localStorage.setItem('marketHubOrders', JSON.stringify(data.orders)); }
          initialLoadDone.current = true;
        }).catch(err => { addLog('error', 'Firebase read: ' + err.message); initialLoadDone.current = true; });
      };
      
      useEffect(() => {
        if (!firebaseReady || !initialLoadDone.current) return;
        if (!window.firebase || !window.firebase.database) return;
        window.firebase.database().ref('data').set(brands).catch(err => addLog('error', err.message));
      }, [brands, firebaseReady]);
      useEffect(() => {
        if (!firebaseReady || !initialLoadDone.current) return;
        if (!window.firebase || !window.firebase.database) return;
        window.firebase.database().ref('orders').set(orders).catch(err => addLog('error', err.message));
      }, [orders, firebaseReady]);
      
      // SheetJS
      useEffect(() => {
        if (window.XLSX) { setSheetJsReady(true); return; }
        const script = document.createElement('script');
        script.src = 'https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js';
        script.async = true;
        script.onload = () => setSheetJsReady(true);
        script.onerror = () => notify("Impossible de charger Excel");
        document.head.appendChild(script);
      }, []);
      
      useEffect(() => { if (logsEndRef.current) logsEndRef.current.scrollIntoView({ behavior: 'smooth' }); }, [logs]);
      
      const copyLogs = async () => {
        const text = logs.map(l => `[${l.timestamp}] ${l.type.toUpperCase()}: ${l.message}`).join('\n');
        try { await navigator.clipboard.writeText(text); alert('Rapport copié'); } catch(err) { alert('Erreur copie'); }
      };
      
      const DebugConsole = () => React.createElement('div', { className: `fixed bottom-0 left-0 right-0 z-50 transition-all duration-300 ${showDebug ? 'h-40' : 'h-8'}` },
        React.createElement('div', { className: 'bg-black/90 backdrop-blur-md w-full text-white text-xs' },
          React.createElement('div', { className: 'flex justify-between items-center px-2 py-1 border-b border-gray-700' },
            React.createElement('button', { onClick: () => setShowDebug(!showDebug), className: 'bg-gray-700 px-2 py-0.5 rounded text-white' }, showDebug ? '▼ Masquer' : '▲ Logs'),
            showDebug && React.createElement('button', { onClick: copyLogs, className: 'bg-blue-600 px-2 py-0.5 rounded text-white' }, 'Copier le rapport')
          ),
          showDebug && React.createElement('div', { className: 'overflow-y-auto h-32 p-2 font-mono text-[10px] leading-relaxed' },
            logs.length === 0 && React.createElement('div', { className: 'text-gray-400' }, 'Aucun log'),
            logs.map((log, idx) => React.createElement('div', { key: idx, className: `border-b border-gray-800 py-0.5 ${log.type === 'error' ? 'text-red-400' : 'text-green-300'}` },
              React.createElement('span', { className: 'text-gray-500' }, `[${log.timestamp}]`), ` [${log.type.toUpperCase()}] ${log.message}`
            )),
            React.createElement('div', { ref: logsEndRef })
          )
        )
      );
      
      const notify = (msg) => { setNotification(msg); setTimeout(() => setNotification(null), 2000); };
      
      const handleImageUpload = (e, setter, state) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
              const canvas = document.createElement("canvas");
              const size = 300;
              canvas.width = size; canvas.height = size;
              const ctx = canvas.getContext("2d");
              const ratio = Math.max(size / img.width, size / img.height);
              const w = img.width * ratio; const h = img.height * ratio;
              ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
              setter({ ...state, image: canvas.toDataURL("image/jpeg", 0.9) });
            };
            img.src = event.target.result;
          };
          reader.readAsDataURL(file);
        }
      };
      
      const addBrand = () => { if (newBrand.name) { setBrands([...brands, { id: Date.now(), ...newBrand, products: [] }]); setNewBrand({ name: "", image: null }); setShowModal(false); notify("Marque ajoutée"); } };
      const deleteBrand = (id) => { setBrands(brands.filter(b => b.id !== id)); notify("Marque supprimée"); };
      const saveBrandEdit = () => { setBrands(brands.map(b => b.id === editingBrand.id ? editingBrand : b)); setEditingBrand(null); notify("Marque mise à jour"); };
      const addProduct = () => { if (newProduct.name && newProduct.brandId) { setBrands(brands.map(b => b.id === newProduct.brandId ? { ...b, products: [...b.products, { id: Date.now(), ...newProduct }] } : b)); setNewProduct({ name: "", qty: "", price: "", image: null, brandId: null }); setShowProductModal(false); notify("Produit ajouté"); } };
      const saveProductEdit = () => { setBrands(brands.map(b => ({ ...b, products: b.products.map(p => p.id === editingProduct.id ? editingProduct : p) }))); setEditingProduct(null); notify("Produit modifié"); };
      const deleteProduct = (brandId, productId) => { setBrands(brands.map(b => b.id === brandId ? { ...b, products: b.products.filter(p => p.id !== productId) } : b)); notify("Produit supprimé"); };
      
      const exportToExcel = () => {
        if (!window.XLSX) { notify("Excel pas encore chargé"); return; }
        try {
          const data = [["Marque","Produit","Quantité","Prix"], ...brands.flatMap(b => b.products.map(p => [b.name, p.name, p.qty, p.price]))];
          const ws = window.XLSX.utils.aoa_to_sheet(data);
          const wb = window.XLSX.utils.book_new();
          window.XLSX.utils.book_append_sheet(wb, ws, "Inventaire");
          window.XLSX.writeFile(wb, "export_inventaire.xlsx");
          notify("Export réussi");
        } catch(err) { addLog('error', err.message); notify("Erreur export"); }
      };
      
      const analyzeImportFile = (file) => {
        if (!window.XLSX) { notify("Excel pas chargé"); return; }
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const data = new Uint8Array(evt.target.result);
            const wb = window.XLSX.read(data, { type: 'array' });
            const ws = wb.Sheets[wb.SheetNames[0]];
            const firstRow = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" })[0];
            if (!firstRow || firstRow.length < 4) throw new Error("Colonnes insuffisantes");
            const expected = ["Marque","Produit","Quantité","Prix"];
            const headers = firstRow.slice(0,4).map(c => String(c).trim());
            if (!expected.every((h,i) => headers[i] === h)) { notify(`En-têtes incorrectes : ${headers.join(', ')}`); return; }
            const rows = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
            if (!rows || rows.length < 2) throw new Error("Fichier vide");
            const brandProducts = new Map();
            let totalProducts = 0, errors = [];
            for (let i=1; i<rows.length; i++) {
              const row = rows[i];
              if (!row || row.length < 4) continue;
              let brandName = row[0] ? String(row[0]).trim() : "";
              const productName = row[1] ? String(row[1]).trim() : "";
              const qtyRaw = row[2], priceRaw = row[3];
              if (!productName) continue;
              if (!brandName) brandName = "Inconnue";
              let qty = 0, price = 0, valid = true;
              if (isNaN(parseFloat(qtyRaw))) { errors.push(`Ligne ${i+1}: Qté non numérique`); valid = false; } else qty = parseFloat(qtyRaw);
              if (isNaN(parseFloat(priceRaw))) { errors.push(`Ligne ${i+1}: Prix non numérique`); valid = false; } else price = parseFloat(priceRaw);
              if (!valid) continue;
              if (!brandProducts.has(brandName)) brandProducts.set(brandName, new Map());
              const prodMap = brandProducts.get(brandName);
              if (!prodMap.has(productName)) { prodMap.set(productName, { qty, price }); totalProducts++; }
              else prodMap.set(productName, { qty, price });
            }
            setPreviewData({ brandProducts, totalProducts, totalBrands: brandProducts.size, errors });
            notify(`Analyse : ${totalProducts} produits dans ${brandProducts.size} marques, ${errors.length} erreurs.`);
          } catch(err) { addLog('error', err.message); notify("Erreur analyse"); setPreviewData(null); }
        };
        reader.readAsArrayBuffer(file);
      };
      
      const confirmImport = async () => {
        if (!previewData || isImporting) return;
        setIsImporting(true);
        await new Promise(r => setTimeout(r, 50));
        try {
          const { brandProducts } = previewData;
          let updatedBrands = [...brands];
          let productsAdded = 0, productsUpdated = 0;
          for (let [brandName, productsMap] of brandProducts.entries()) {
            let brandIndex = updatedBrands.findIndex(b => b.name === brandName);
            if (brandIndex === -1) {
              updatedBrands.push({ id: Date.now() + Math.random()*10000, name: brandName, image: null, products: [] });
              brandIndex = updatedBrands.length - 1;
            }
            const existingProducts = updatedBrands[brandIndex].products;
            for (let [productName, { qty, price }] of productsMap.entries()) {
              const existingIndex = existingProducts.findIndex(p => p.name === productName);
              if (existingIndex !== -1) { existingProducts[existingIndex].qty = qty; existingProducts[existingIndex].price = price; productsUpdated++; }
              else { existingProducts.push({ id: Date.now() + Math.random()*10000, name: productName, qty, price, image: null }); productsAdded++; }
            }
            updatedBrands[brandIndex].products = existingProducts;
          }
          setBrands(updatedBrands);
          notify(`Import confirmé : ${productsAdded} nouveaux, ${productsUpdated} mis à jour.`);
          setPreviewData(null);
          setShowDataModal(false);
        } catch(err) { addLog('error', err.message); notify("Erreur import"); }
        finally { setIsImporting(false); }
      };
      
      const cancelPreview = () => { setPreviewData(null); notify("Import annulé"); };
      
      const openBrand = (brand) => { setIsTransitioning(true); setTimeout(() => { setSelectedBrand(brand); setCurrentView('brand'); setIsTransitioning(false); }, 300); };
      const goHome = () => { setIsTransitioning(true); setTimeout(() => { setCurrentView('home'); setIsTransitioning(false); }, 300); };
      const toggleAdmin = () => { if (isAdmin) { setIsAdmin(false); goHome(); } else { setPinCode(''); setShowPinModal(true); } };
      const handlePinDigit = (digit) => { if (pinCode.length < 6) setPinCode(prev => prev + digit); };
      const handlePinDelete = () => { setPinCode(prev => prev.slice(0, -1)); };
      useEffect(() => { if (pinCode.length === 6) { if (pinCode === "000000") { setIsAdmin(true); setShowPinModal(false); setPinCode(''); goHome(); notify("Connexion admin"); } else { notify("Code incorrect"); setPinCode(''); } } }, [pinCode]);
      
      const openProductModal = (product) => { setSelectedProduct(product); setProductQuantity(1); setShowCartModal(false); };
      const addToCart = () => {
        if (!selectedProduct) return;
        const existing = cart.find(item => item.product.id === selectedProduct.id && item.brandId === selectedBrand?.id);
        if (existing) setCart(cart.map(item => item.product.id === selectedProduct.id && item.brandId === selectedBrand?.id ? { ...item, quantity: item.quantity + productQuantity } : item));
        else setCart([...cart, { product: selectedProduct, brandId: selectedBrand.id, brandName: selectedBrand.name, quantity: productQuantity }]);
        notify(`${productQuantity} × ${selectedProduct.name} ajouté`);
        setSelectedProduct(null);
      };
      const removeFromCart = (index) => { const newCart = [...cart]; newCart.splice(index,1); setCart(newCart); notify("Article retiré"); };
      const cartTotal = cart.reduce((sum, item) => sum + (parseFloat(item.product.price) * item.quantity), 0);
      const openDeliveryModal = () => { setShowCartModal(false); setDeliveryInfo({ name: "", phone: "", address: "", instructions: "" }); setShowDeliveryModal(true); };
      const validateOrder = () => {
        if (!deliveryInfo.name || !deliveryInfo.address) { notify("Nom et adresse requis"); return; }
        const newOrder = { id: Date.now(), timestamp: new Date().toLocaleString(), items: [...cart], delivery: { ...deliveryInfo }, total: cartTotal, status: "new" };
        setOrders([newOrder, ...orders]);
        setCart([]);
        setShowDeliveryModal(false);
        notify(`Commande envoyée ! Total : ${cartTotal.toFixed(2)}€`);
      };
      const updateOrderStatus = (orderId, newStatus) => { setOrders(orders.map(o => o.id === orderId ? { ...o, status: newStatus } : o)); notify(`Commande ${newStatus === "processed" ? "traitée" : "livrée"}`); };
      const newOrders = orders.filter(o => o.status === "new");
      const processedOrders = orders.filter(o => o.status === "processed");
      const deliveredOrders = orders.filter(o => o.status === "delivered");
      const requestConfirm = (type, payload, callback) => { setConfirmAction({ type, payload, callback }); };
      const cancelConfirm = () => setConfirmAction(null);
      const executeConfirm = () => { if (confirmAction && confirmAction.callback) confirmAction.callback(); setConfirmAction(null); };
      
      // Sauvegardes locales
      useEffect(() => { localStorage.setItem('marketHubCart', JSON.stringify(cart)); }, [cart]);
      useEffect(() => { localStorage.setItem('marketHubBrands', JSON.stringify(brands)); }, [brands]);
      useEffect(() => { localStorage.setItem('marketHubOrders', JSON.stringify(orders)); }, [orders]);
      
      if (isLoading) return React.createElement('div', { className: 'fixed inset-0 bg-slate-900 flex items-center justify-center' }, React.createElement('div', { className: 'text-slate-200 text-lg' }, 'Chargement...'));
      
      // Helper pour générer les éléments répétés (éviter trop de duplication)
      const renderBrandsGrid = () => brands.map(brand => React.createElement('div', { key: brand.id, className: 'flex flex-col items-center gap-2' },
        React.createElement('button', { onClick: () => openBrand(brand), className: 'w-full aspect-square rounded-[24px] overflow-hidden border border-slate-700 bg-slate-800 shadow-md transition-transform active:scale-95 hover:shadow-lg hover:shadow-indigo-500/20' },
          brand.image ? React.createElement('img', { src: brand.image, className: 'w-full h-full object-cover' }) : React.createElement('div', { className: 'w-full h-full bg-slate-700 flex items-center justify-center text-[10px] text-slate-400 font-medium' }, 'IMAGE')
        ),
        React.createElement('span', { className: 'text-slate-300 font-semibold text-xs tracking-tight bg-slate-800/80 px-2 py-0.5 rounded-full' }, brand.name)
      ));
      
      const renderProductsGrid = () => selectedBrand.products.map(prod => React.createElement('div', { key: prod.id, className: 'flex flex-col items-center gap-2 bg-slate-800/50 p-2 rounded-2xl shadow-sm border border-slate-700' },
        React.createElement('button', { onClick: () => openProductModal(prod), className: 'w-full aspect-square rounded-[20px] overflow-hidden border border-slate-600 bg-slate-700 active:scale-95 transition-transform' },
          prod.image ? React.createElement('img', { src: prod.image, className: 'w-full h-full object-cover' }) : React.createElement('div', { className: 'w-full h-full bg-slate-700 flex items-center justify-center text-[10px] text-slate-400 font-medium' }, 'PROD')
        ),
        React.createElement('span', { className: 'text-slate-200 font-medium text-xs text-center px-1' }, prod.name),
        showPrices ? React.createElement('span', { className: 'text-indigo-400 font-bold text-sm bg-slate-800 px-3 py-1 rounded-full' }, `${prod.price}€`) : React.createElement('span', { className: 'text-slate-500 font-bold text-sm bg-slate-800 px-3 py-1 rounded-full' }, '•••')
      ));
      
      return React.createElement('div', { className: 'fixed inset-0 bg-slate-900 flex justify-center font-sans' },
        notification && React.createElement('div', { className: 'fixed top-6 z-[100] bg-slate-800 text-slate-100 px-6 py-3 rounded-full text-xs font-bold shadow-2xl animate-fade-in-down border border-indigo-500/30' }, notification),
        React.createElement('div', { className: `w-full min-h-screen p-4 transition-opacity duration-300 ${isTransitioning ? 'opacity-0' : 'opacity-100'}` },
          // HEADER
          React.createElement('div', { className: 'flex justify-between items-center mb-8 mt-2' },
            React.createElement('button', { onClick: goHome, className: 'text-slate-400 text-[11px] font-medium tracking-tight hover:text-slate-200 transition-colors' }, currentView === 'home' ? 'LAICHE HOLDING' : '← Retour'),
            React.createElement('div', { className: 'flex items-center gap-2' },
              isAdmin && React.createElement('button', { onClick: () => setShowPrices(!showPrices), className: `w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold transition-all active:scale-95 ${showPrices ? 'bg-indigo-600 text-white' : 'bg-slate-700 text-slate-300'}`, title: showPrices ? "Masquer les prix" : "Afficher les prix" }, showPrices ? '€' : '€̷'),
              React.createElement('button', { onClick: toggleAdmin, className: `px-4 py-1 text-[10px] font-semibold uppercase tracking-widest rounded-lg border transition-all ${isAdmin ? "bg-indigo-600 text-white border-indigo-500" : "bg-slate-800 text-slate-300 border-slate-700 hover:bg-slate-700"}` }, isAdmin ? "Admin" : "Connexion")
            )
          ),
